<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/cyborg-standalone-games.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #ff0080); /* dark to purple/pink */
            background-repeat: no-repeat;
            background-attachment: fixed; 
            background-size: cover;
            min-height: 100vh;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 24px 14px 28px;
            display: flex;
            flex-direction: column; /* Ensures proper stacking of elements */
            align-items: center;
        }
        .heading {
       color: white;
       margin: 16px 0 24px;
       width: min(100%, 680px);
       border-radius: 14px;
       padding: 20px;
       font-size: clamp(26px, 5.2vw, 40px);
       line-height: 1.15;
       text-align: center;
       background: linear-gradient(95deg, #5533ff 40%, #25ddf5 100%);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            width: min(1140px, 100%);
            gap: 18px;
            padding: 8px 0 12px;
        }
        .category-box {
            min-height: 208px;
            background: linear-gradient(95deg, #5533ff 40%, #25ddf5 100%);
            color: white;
            border-radius: 12px;
            text-align: center;
            padding: 14px;
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.2);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .category-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.25);
        }
        .category-box:focus-visible {
            outline: 3px solid #ff4f95;
            outline-offset: 3px;
        }
        .category-box img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
        }
        .category-box h3 {
            font-size: 16px;
            margin: 12px 0 0 0;
            line-height: 1.35;
        }
    </style>
</head>
<body>

    <div class="heading">Please Choose a Category</div> 

    <div class="container" id="category-container">
        <!-- Categories will be dynamically inserted here -->
    </div>

    <script>
        // Sample category data
        const categories = [
    { id: 9, name: "General Knowledge", logo: "logos/l14.jpg" },
    { id: 10, name: "Entertainment: Books", logo: "logos/l15.jpg" },
    { id: 11, name: "Entertainment: Film", logo: "logos/l22.jpg" },
    { id: 12, name: "Entertainment: Music", logo: "logos/l18.jpg" },
    { id: 13, name: "Entertainment: Musicals & Theatres", logo: "logos/l16.jpg" },
    { id: 14, name: "Entertainment: Television", logo: "logos/l19.jpg" },
    { id: 15, name: "Entertainment: Video Games", logo: "logos/l1.jpg" },
    { id: 16, name: "Entertainment: Board Games", logo: "logos/l4.jpg" },
    { id: 17, name: "Science & Nature", logo: "logos/l21.jpg" },
    { id: 18, name: "Science: Computers", logo: "logos/l20.jpg" },
    { id: 19, name: "Science: Mathematics", logo: "logos/l2.jpg" },
    { id: 20, name: "Mythology", logo: "logos/l29.jpg" },
    { id: 21, name: "Sports", logo: "logos/l8.jpg" },
    { id: 22, name: "Geography", logo: "logos/l6.jpg" },
    { id: 23, name: "History", logo: "logos/l10.jpg" },
    { id: 24, name: "Politics", logo: "logos/l12.jpg" },
    { id: 25, name: "Art", logo: "logos/l3.jpg" },
    { id: 26, name: "Celebrities", logo: "logos/l5.jpg" },
    { id: 27, name: "Animals", logo: "logos/l11.jpg" },
    { id: 28, name: "Vehicles", logo: "logos/l30.jpg" },   // Vehicles is 28
    { id: 29, name: "Entertainment: Comics", logo: "logos/l26.jpg" },
    { id: 30, name: "Science: Gadgets", logo: "logos/l27.jpg" },
    { id: 31, name: "Entertainment: Japanese Anime & Manga", logo: "logos/l25.jpg" },
    { id: 32, name: "Entertainment: Cartoon & Animations", logo: "logos/l28.jpg" }
];


        // Function to generate the category boxes
        function createCategoryBoxes() {
            const container = document.getElementById('category-container');
            categories.forEach(category => {
                const box = document.createElement('div');
                box.classList.add('category-box');
                box.onclick = () => redirectToQuizPage(category.id);
                box.tabIndex = 0;
                box.setAttribute('role', 'button');
                box.setAttribute('aria-label', `Choose ${category.name}`);
                box.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        redirectToQuizPage(category.id);
                    }
                });
                
                const logo = document.createElement('img');
                logo.src = category.logo;
                logo.alt = category.name; // Accessibility improvement
                box.appendChild(logo);

                const name = document.createElement('h3');
                name.textContent = category.name;
                box.appendChild(name);

                container.appendChild(box);
            });
        }

        // Function to redirect to the quiz page for the selected category
        function redirectToQuizPage(categoryId) {
            localStorage.setItem("categoryId", categoryId.toString());
            window.location.href = "quiz-cyborg.html"; // Fixed syntax
        }

        // Call function to create category boxes on page load
        document.addEventListener("DOMContentLoaded", createCategoryBoxes);
    </script>

  <script src="assets/js/app-enhancer.js"></script>
</body>
</html>
